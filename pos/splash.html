<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tillaroo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  .close-btn {
    position: fixed; top: 10px; right: 12px;
    background: none; border: none; color: #4a5066;
    font-size: 20px; cursor: pointer; padding: 4px 8px;
    border-radius: 4px; line-height: 1;
    -webkit-app-region: no-drag;
  }
  .close-btn:hover { color: #f1f5f9; background: rgba(255,255,255,0.08); }
  .logo {
    width: 96px; height: 96px;
    border-radius: 24px;
    margin-bottom: 24px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(1.03); }
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 32px;
  }
  .status {
    font-size: 13px;
    color: #8892a8;
    margin-bottom: 16px;
    min-height: 20px;
    transition: opacity 0.3s;
  }
  .progress-track {
    width: 260px;
    height: 4px;
    background: #1a1d27;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4fbd77, #6ed99b);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-bar.error {
    background: linear-gradient(90deg, #ef4444, #f87171);
    width: 100%;
  }
  .error-box {
    display: none;
    margin-top: 16px;
    padding: 10px 16px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    max-width: 340px;
    text-align: center;
  }
  .error-box .error-msg {
    font-size: 12px;
    color: #f87171;
    word-break: break-word;
    line-height: 1.4;
  }
  .error-box .error-hint {
    font-size: 10px;
    color: #6b7280;
    margin-top: 6px;
  }
  .version {
    position: fixed;
    bottom: 16px;
    font-size: 11px;
    color: #4a5066;
  }
</style>
</head>
<body>
  <button class="close-btn" id="closeBtn" title="Close">&times;</button>
  <img class="logo" src="logo.png" alt="">
  <h1>Tillaroo</h1>
  <div class="status" id="status">Starting up...</div>
  <div class="progress-track"><div class="progress-bar" id="progress"></div></div>
  <div class="error-box" id="errorBox">
    <div class="error-msg" id="errorMsg"></div>
    <div class="error-hint">The app will close in a few seconds. Check the logs for details.</div>
  </div>
  <div class="version" id="version"></div>
  <script>
    const { ipcRenderer } = require('electron')

    ipcRenderer.on('splash:status', (_e, msg, pct) => {
      document.getElementById('status').textContent = msg
      if (pct != null) document.getElementById('progress').style.width = pct + '%'
    })
    ipcRenderer.on('splash:version', (_e, v) => {
      document.getElementById('version').textContent = 'v' + v
    })
    ipcRenderer.on('splash:error', (_e, msg) => {
      document.getElementById('status').textContent = 'Error'
      document.getElementById('status').style.color = '#f87171'
      document.getElementById('progress').className = 'progress-bar error'
      document.getElementById('errorBox').style.display = 'block'
      document.getElementById('errorMsg').textContent = msg
      document.querySelector('.logo').style.animation = 'none'
      document.querySelector('.logo').style.opacity = '0.4'
    })

    // Close button
    document.getElementById('closeBtn').addEventListener('click', () => {
      ipcRenderer.send('splash:close')
    })

    // Manual window drag
    let dragging = false, ox = 0, oy = 0
    document.body.addEventListener('mousedown', e => {
      if (e.target.closest('.close-btn')) return
      dragging = true; ox = e.screenX; oy = e.screenY
    })
    document.addEventListener('mousemove', e => {
      if (!dragging) return
      const dx = e.screenX - ox, dy = e.screenY - oy
      ox = e.screenX; oy = e.screenY
      ipcRenderer.send('splash:move', dx, dy)
    })
    document.addEventListener('mouseup', () => { dragging = false })
  </script>
</body>
</html>
